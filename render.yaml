# Render Blueprint for the FastAPI backend.
# In the Render dashboard: New > Blueprint, point it at this repo, then set the
# DATABASE_URL env var to your Neon (or other) PostgreSQL connection string.
services:
  - type: web
    name: hms-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Paste your Neon PostgreSQL URL here in the Render dashboard (kept secret).
      - key: DATABASE_URL
        sync: false
      # Render generates a strong random value for signing JWTs.
      - key: JWT_SECRET
        generateValue: true
      - key: SEED_DEMO_DATA
        value: "true"
